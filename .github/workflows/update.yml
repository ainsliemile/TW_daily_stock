name: 每日自動更新股票面板

on:
  schedule:
    # 台灣時間早上 07:00 = UTC 23:00 (前一天) 
    # 這裡設定 0-4 代表 UTC 的週日到週四，對應台灣的週一到週五早上 07:00
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          pip install -r requirements.txt

      - name: 執行資料抓取與網頁生成
        env:
          # 🌟 核心修改：讀取 GitHub Secrets 中的 LINE Token
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python generate_dashboard.py

      - name: 將生成的網頁與歷史大數據庫同步回傳 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html historical_momentum_data.csv
          git commit -m "Auto update dashboard and save history data" || exit 0
          git push
