name: 每日自動更新股票面板

on:
  schedule:
    # 台灣時間早上 05:45 = UTC 22:45 (前一天) ，美股台灣時間5:00收盤
    - cron: '45 21 * * 0-4'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          pip install -r requirements.txt

      - name: 執行資料抓取與網頁生成
        env:
          # 🌟 讀取 GitHub Secrets 中的 Gmail 帳號與應用程式密碼
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python generate_dashboard.py

      - name: 將生成的網頁與歷史大數據庫同步回傳 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html historical_momentum_data.csv
          git commit -m "Auto update dashboard and save history data" || exit 0
          git push
